name: dtcllm-rag

services:
  app:
    image: mcr.microsoft.com/devcontainers/python:3-3.13-trixie
    command: sleep infinity
    env_file:
      - .env
    volumes:
      - ..:/workspaces/dtcllm-introduction-to-rag:cached
      - devcontainer-uv-cache:/home/vscode/.cache/uv
      - devcontainer-huggingface-cache:/home/vscode/.cache/huggingface
      - devcontainer-torch-cache:/home/vscode/.cache/torch
    environment:
      UV_CACHE_DIR: /home/vscode/.cache/uv
      UV_LINK_MODE: copy
      HF_HOME: /home/vscode/.cache/huggingface
      TORCH_HOME: /home/vscode/.cache/torch
      PGVECTOR_HOST: pgvector
      PGVECTOR_PORT: "5432"
      PGVECTOR_DATABASE: ${PGVECTOR_DATABASE}
      PGVECTOR_USER: ${PGVECTOR_USER}
      PGVECTOR_PASSWORD: ${PGVECTOR_PASSWORD}
      PGVECTOR_CONNECTION_STRING: postgresql://${PGVECTOR_USER}:${PGVECTOR_PASSWORD}@pgvector:5432/${PGVECTOR_DATABASE}
    depends_on:
      pgvector:
        condition: service_healthy

  pgvector:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${PGVECTOR_USER}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD}
      POSTGRES_DB: ${PGVECTOR_DATABASE}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  devcontainer-uv-cache:
    name: devcontainer-uv-cache
  devcontainer-huggingface-cache:
    name: devcontainer-huggingface-cache
  devcontainer-torch-cache:
    name: devcontainer-torch-cache
  pgvector_data:
